services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_purchase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_purchase"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      APP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_purchase
      APP_DATASOURCE_USERNAME: postgres
      APP_DATASOURCE_PASSWORD: postgres
    ports:
      - "8337:8337"

volumes:
  postgres-data:
